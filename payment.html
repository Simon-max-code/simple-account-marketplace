<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | AccountMarket</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    
    <nav>
        <div class="container">
            <a href="index.html" class="logo">AccountMarket</a>
            <div class="nav-links">
                <a href="index.html">Browse</a>
                <a href="orders.html">My Orders</a>
                <a href="#" onclick="showToast('Support is currently offline'); return false;">Support</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="payment-form">
            <h2>Complete Payment</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Secure payment processing • Your data is encrypted</p>
            
            <div style="background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.3); border-radius: 10px; padding: 16px; margin-bottom: 30px; color: var(--success);">
                <strong>Amount Due:</strong> <span id="total-display" style="font-size: 1.3rem;">$0.00</span>
            </div>
            
            <form id="payment-form">
                <div class="form-group">
                    <label for="method">Payment Method</label>
                    <select id="method" name="method" required>
                        <option value="">Select a payment method</option>
                        <option value="Crypto">Cryptocurrency (BTC/ETH)</option>
                        <option value="PayPal">PayPal</option>
                        <option value="Card">Credit Card</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="txid">Transaction ID / Reference *</label>
                    <input type="text" id="txid" name="txid" placeholder="Enter your transaction ID or reference number" required>
                </div>

                <div class="form-group">
                    <label for="receipt">Upload Receipt (Optional)</label>
                    <input type="file" id="receipt" name="receipt" accept="image/*">
                    <small style="color: var(--text-muted); display: block; margin-top: 8px;">Accepted formats: JPG, PNG, GIF (Max 5MB)</small>
                </div>

                <button type="submit" class="btn" style="margin-top: 20px;">Submit Payment for Verification</button>
            </form>

            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 20px; text-align: center;">
                By submitting, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </p>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const total = localStorage.getItem('last_total');
            document.getElementById('total-display').innerText = `$${total}`;

            document.getElementById('payment-form').onsubmit = (e) => {
                e.preventDefault();
                
                const accountId = parseInt(localStorage.getItem('selected_account_id'));
                const txid = document.getElementById('txid').value;
                const method = document.getElementById('method').value;
                
                if (!txid.trim()) {
                    showToast('Please enter a transaction ID', 'warning');
                    return;
                }
                
                const newOrder = {
                    id: 'ORD-' + Math.floor(Math.random() * 1000000),
                    accountId: accountId,
                    txid: txid,
                    method: method,
                    timestamp: new Date().getTime(),
                    status: 'awaiting_verification'
                };

                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                orders.push(newOrder);
                localStorage.setItem('orders', JSON.stringify(orders));
                
                showToast('✓ Payment submitted for verification!', 'success');
                setTimeout(() => window.location.href = 'orders.html', 1500);
            };
        });
    </script>
</body>
</html>
