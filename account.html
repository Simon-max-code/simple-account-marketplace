<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Details | AccountMarket</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    
    <nav>
        <div class="container">
            <a href="index.html" class="logo">AccountMarket</a>
            <div class="nav-links">
                <a href="index.html">Browse</a>
                <a href="orders.html">My Orders</a>
                <a href="#" onclick="showToast('Support is currently offline'); return false;">Support</a>
            </div>
            <button class="hamburger" id="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="container">
        <div id="details-view" class="details-container">
            <!-- Details will be injected here -->
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const accountId = parseInt(urlParams.get('id'));
            const account = accounts.find(a => a.id === accountId);

            if (!account) {
                document.getElementById('details-view').innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <h1 style="font-size: 2rem; margin-bottom: 20px;">Account Not Found</h1>
                        <p style="color: var(--text-muted); margin-bottom: 30px;">The account you're looking for doesn't exist or has been removed.</p>
                        <a href="index.html" class="btn" style="display: inline-block; padding: 12px 30px;">← Back to Marketplace</a>
                    </div>
                `;
                return;
            }

            const detailsView = document.getElementById('details-view');
            detailsView.innerHTML = `
                <div>
                    <img src="${account.image}" alt="${account.title}" class="details-img" onerror="this.src='https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=600&h=400&fit=crop'">
                </div>
                <div class="details-content">
                    <h2>${account.title}</h2>
                    <div class="details-price">$${account.price}</div>
                    
                    <h3 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: var(--text-main);">Key Features</h3>
                    <ul class="features-list">
                        ${account.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>

                    <div style="margin-top: 40px; display: flex; gap: 16px;">
                        <button onclick="proceedToCheckout(${account.id})" class="btn" style="font-size: 1rem; padding: 14px 28px; flex: 1;">Buy Now</button>
                        <a href="index.html" class="btn" style="font-size: 1rem; padding: 14px 28px; flex: 1; text-align: center; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--text-muted);">← Back</a>
                    </div>
                </div>
            `;
        });

        function proceedToCheckout(id) {
            localStorage.setItem('selected_account_id', id);
            showToast('Account selected! Redirecting to checkout...', 'success');
            setTimeout(() => window.location.href = 'checkout.html', 1200);
        }
    </script>
</body>
</html>
