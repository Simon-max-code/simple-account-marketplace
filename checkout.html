<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Fenxo Store</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    
    <nav>
        <div class="container">
            <a href="index.html" class="logo">Fenxo Store</a>
            <div class="nav-links">
                <a href="index.html">Browse</a>
                <a href="orders.html">My Orders</a>
                <a href="#" onclick="showToast('Support is currently offline'); return false;">Support</a>
            </div>
            <button class="hamburger" id="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="container">
        <div class="checkout-box">
            <h2>Order Summary</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Review your purchase before proceeding to payment</p>
            
            <div id="summary-content">
                <!-- Summary will be injected here -->
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 30px;">
                <button onclick="window.location.href='payment.html'" class="btn" style="flex: 1;">Continue to Payment</button>
                <button onclick="window.history.back()" class="btn" style="flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--text-muted);">← Back</button>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const accountId = parseInt(localStorage.getItem('selected_account_id'));
            const account = accounts.find(a => a.id === accountId);

            if (!account) {
                window.location.href = 'index.html';
                return;
            }

            const fee = (account.price * 0.05).toFixed(2);
            const total = (parseFloat(account.price) + parseFloat(fee)).toFixed(2);

            const summaryContent = document.getElementById('summary-content');
            summaryContent.innerHTML = `
                <div class="checkout-row">
                    <span style="color: var(--text-main);">${account.title}</span>
                    <span style="color: var(--text-main); font-weight: 600;">$${account.price}</span>
                </div>
                <div class="checkout-row">
                    <span style="color: var(--text-muted);">Platform Fee (5%)</span>
                    <span style="color: var(--text-muted);">$${fee}</span>
                </div>
                <div class="checkout-row total-row">
                    <span>Total Amount</span>
                    <span>$${total}</span>
                </div>
            `;
            
            localStorage.setItem('last_total', total);
            showToast('Order summary loaded ✓', 'success');
        });
    </script>
</body>
</html>
