<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credentials | AccountMarket</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">AccountMarket</a>
            <div class="nav-links">
                <a href="index.html">Browse</a>
                <a href="orders.html">My Orders</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="credentials-view" class="credentials-box">
            <!-- Content will be injected here -->
        </div>
    </main>

    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const order = orders.find(o => o.id === orderId);

            if (!order || order.status !== 'credentials_released') {
                document.getElementById('credentials-view').innerHTML = `
                    <h2 style="color: #ef4444;">Access Denied</h2>
                    <p>Credentials are not available for this order yet.</p>
                    <a href="orders.html" class="btn" style="margin-top: 20px; display: inline-block;">Back to Orders</a>
                `;
                return;
            }

            const account = accounts.find(a => a.id === order.accountId);
            const view = document.getElementById('credentials-view');
            
            view.innerHTML = `
                <h2 style="margin-bottom: 10px;">Account Credentials</h2>
                <p style="color: var(--text-muted); margin-bottom: 25px;">Order: ${order.id} - ${account.title}</p>
                
                <div class="credential-item">
                    <div>
                        <small style="display: block; color: var(--text-muted);">Email</small>
                        <strong>${account.credentials.email}</strong>
                    </div>
                    <button class="copy-btn" onclick="copyText('${account.credentials.email}')">Copy</button>
                </div>

                <div class="credential-item">
                    <div>
                        <small style="display: block; color: var(--text-muted);">Username</small>
                        <strong>${account.credentials.username}</strong>
                    </div>
                    <button class="copy-btn" onclick="copyText('${account.credentials.username}')">Copy</button>
                </div>

                <div class="credential-item">
                    <div>
                        <small style="display: block; color: var(--text-muted);">Password</small>
                        <strong>${account.credentials.password}</strong>
                    </div>
                    <button class="copy-btn" onclick="copyText('${account.credentials.password}')">Copy</button>
                </div>

                <div style="margin-top: 30px; display: flex; gap: 10px;">
                    <button onclick="markAccessed()" class="btn" style="flex: 2;">I've Accessed This</button>
                    <a href="orders.html" class="btn btn-secondary" style="flex: 1;">Back</a>
                </div>
            `;
        });

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function markAccessed() {
            alert('Thank you! Your order has been completed.');
            window.location.href = 'orders.html';
        }
    </script>
</body>
</html>
