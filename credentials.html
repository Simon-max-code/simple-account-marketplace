<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credentials | Fenxo Store</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    
    <nav>
        <div class="container">
            <a href="index.html" class="logo">Fenxo Store</a>
            <div class="nav-links">
                <a href="index.html">Browse</a>
                <a href="orders.html">My Orders</a>
                <a href="#" onclick="showToast('Support is currently offline'); return false;">Support</a>
            </div>
            <button class="hamburger" id="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="container">
        <div id="credentials-view" class="credentials-box">
            <!-- Content will be injected here -->
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const order = orders.find(o => o.id === orderId);

            if (!order || order.status !== 'credentials_released') {
                document.getElementById('credentials-view').innerHTML = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <div style="font-size: 3rem; margin-bottom: 20px;">🔒</div>
                        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; color: #ef4444;">Access Denied</h2>
                        <p style="color: var(--text-muted); margin-bottom: 30px;">Credentials are not available for this order yet. Please check back soon or contact support.</p>
                        <a href="orders.html" class="btn" style="display: inline-block; padding: 12px 28px;">← Back to Orders</a>
                    </div>
                `;
                return;
            }

            const account = accounts.find(a => a.id === order.accountId);
            const view = document.getElementById('credentials-view');
            
            view.innerHTML = `
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="font-size: 2.5rem; margin-bottom: 15px;">✓</div>
                    <h2>Account Credentials</h2>
                    <p style="color: var(--text-muted); margin-top: 10px;">Order: <strong>${order.id}</strong></p>
                    <p style="color: var(--text-muted);">${account.title}</p>
                </div>
                
                <div style="background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.3); border-radius: 10px; padding: 16px; margin-bottom: 30px; color: var(--success); text-align: center;">
                    <strong>✓ Credentials Ready</strong> • Click copy to save each credential
                </div>

                <div class="credential-item">
                    <div>
                        <div class="credential-label">Email Address</div>
                        <div class="credential-value">${account.credentials.email}</div>
                    </div>
                    <button class="copy-btn" onclick="copyToClipboard('${account.credentials.email}')">Copy</button>
                </div>

                <div class="credential-item">
                    <div>
                        <div class="credential-label">Username</div>
                        <div class="credential-value">${account.credentials.username}</div>
                    </div>
                    <button class="copy-btn" onclick="copyToClipboard('${account.credentials.username}')">Copy</button>
                </div>

                <div class="credential-item">
                    <div>
                        <div class="credential-label">Password</div>
                        <div class="credential-value">${account.credentials.password}</div>
                    </div>
                    <button class="copy-btn" onclick="copyToClipboard('${account.credentials.password}')">Copy</button>
                </div>

                <div style="margin-top: 40px; display: flex; gap: 12px;">
                    <button onclick="markAccessed()" class="btn" style="flex: 1;">✓ Mark as Accessed</button>
                    <a href="orders.html" class="btn" style="flex: 1; text-align: center; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--text-muted);">← Back</a>
                </div>

                <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 20px; text-align: center;">
                    Keep these credentials safe. We recommend changing the password after login.
                </p>
            `;
        });

        function markAccessed() {
            showToast('✓ Thank you! Order marked as completed.', 'success');
            setTimeout(() => window.location.href = 'orders.html', 1200);
        }
    </script>
</body>
</html>
